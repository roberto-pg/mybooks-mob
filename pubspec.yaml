name: my_books
description: A new Flutter project.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ">=2.12.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_modular: ^4.0.1+2
  flutter_triple: ^1.2.4+3
  equatable: ^2.0.3
  dio: ^4.0.0
  flutter_secure_storage: ^5.0.2
  google_fonts: ^2.1.0
  connectivity_plus: ^2.2.0
  asuka: ^2.0.0-nullsafety.3
  animated_card: ^2.0.0
  image_picker: ^0.8.4+2
  http_parser: ^4.0.0
  validatorless: ^1.2.1
  jwt_decoder: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  triple_test: ^0.0.8
  flutter_lints: ^1.0.4
flutter:
  uses-material-design: true

  assets:
    - lib/assets/images/

  fonts:
    - family: Pacifico
      fonts:
       - asset: lib/assets/fonts/Pacifico-Regular.ttf